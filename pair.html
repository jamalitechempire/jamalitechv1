<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JAMALI MD Pair">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>⚡ JAMALI MD | Pair Device</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* animated background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }

  .orb-1 {
    width: 60vw;
    height: 60vw;
    background: #00f2fe;
    top: -20vh;
    left: -20vw;
    animation: float1 18s infinite alternate;
  }

  .orb-2 {
    width: 50vw;
    height: 50vw;
    background: #4facfe;
    bottom: -15vh;
    right: -15vw;
    animation: float2 22s infinite alternate;
  }

  .orb-3 {
    width: 40vw;
    height: 40vw;
    background: #b721ff;
    bottom: 30%;
    left: 20%;
    animation: float3 20s infinite alternate;
  }

  @keyframes float1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(10%, 10%) scale(1.2); }
  }
  @keyframes float2 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-10%, -5%) scale(1.3); }
  }
  @keyframes float3 {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(5%, -10%) rotate(5deg); }
  }

  /* glass card */
  .card {
    position: relative;
    z-index: 10;
    max-width: 480px;
    width: 100%;
    background: rgba(12, 15, 25, 0.65);
    backdrop-filter: blur(16px);
    border-radius: 2rem;
    border: 1px solid rgba(0, 242, 254, 0.25);
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.05) inset;
    padding: 2rem 1.75rem;
    transition: all 0.3s ease;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 242, 254, 0.12);
    border: 1px solid rgba(0, 242, 254, 0.4);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #00f2fe;
    margin-bottom: 1.5rem;
  }

  .badge i {
    font-size: 0.8rem;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #00f2fe, #b721ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  .status-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2rem;
    background: rgba(0,0,0,0.3);
    width: fit-content;
    padding: 5px 14px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .pulse {
    width: 8px;
    height: 8px;
    background: #0f0;
    border-radius: 50%;
    box-shadow: 0 0 6px #0f0;
    animation: pulseAnim 1.4s infinite;
  }

  @keyframes pulseAnim {
    0% { opacity: 0.4; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1.2);}
  }

  .status-text {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ccc;
  }

  /* input group */
  .input-group {
    margin-bottom: 1.5rem;
  }

  .input-icon {
    position: relative;
  }

  .input-icon i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    color: #00f2fe;
    opacity: 0.7;
  }

  input {
    width: 100%;
    background: rgba(0, 0, 0, 0.45);
    border: 1.5px solid rgba(0, 242, 254, 0.3);
    border-radius: 1.5rem;
    padding: 1rem 1rem 1rem 3rem;
    font-size: 1rem;
    font-weight: 500;
    color: #fff;
    font-family: 'Inter', monospace;
    transition: all 0.25s;
    outline: none;
  }

  input:focus {
    border-color: #00f2fe;
    box-shadow: 0 0 12px rgba(0, 242, 254, 0.3);
    background: rgba(0,0,0,0.6);
  }

  /* primary btn */
  .btn-primary {
    width: 100%;
    background: linear-gradient(105deg, #00c6fb 0%, #005bea 100%);
    border: none;
    border-radius: 2rem;
    padding: 1rem;
    font-weight: 700;
    font-size: 1rem;
    font-family: 'Space Grotesk', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 1.8rem;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }

  .btn-primary:hover:not(:disabled)::after {
    left: 100%;
  }

  .btn-primary:active:not(:disabled) {
    transform: scale(0.97);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    filter: grayscale(0.2);
  }

  /* result box */
  .result-box {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    border-radius: 1.5rem;
    padding: 1rem;
    margin-bottom: 1.8rem;
    border: 1px solid rgba(183, 33, 255, 0.4);
    transition: all 0.2s;
    cursor: pointer;
    text-align: center;
    position: relative;
  }

  .result-box:hover {
    border-color: #b721ff;
    box-shadow: 0 0 20px rgba(183,33,255,0.3);
    transform: scale(1.01);
  }

  .result-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 6px;
  }

  .code {
    font-family: 'Space Grotesk', monospace;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: #b721ff;
    text-shadow: 0 0 8px #b721ff80;
    word-break: break-all;
  }

  .copy-hint {
    font-size: 0.6rem;
    margin-top: 8px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .result-box:hover .copy-hint {
    opacity: 1;
  }

  /* 3 small buttons */
  .action-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .action-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2rem;
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #ddd;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .action-btn:hover {
    background: rgba(0, 242, 254, 0.2);
    border-color: #00f2fe;
    color: #00f2fe;
    transform: translateY(-2px);
  }

  footer {
    font-size: 0.7rem;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 1.2rem;
    margin-top: 0.5rem;
    color: #888;
    letter-spacing: 0.5px;
  }

  /* loading spinner inside button */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #111214dd;
    backdrop-filter: blur(16px);
    padding: 10px 20px;
    border-radius: 60px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.25s ease;
    border: 1px solid rgba(0,242,254,0.4);
    color: #00f2fe;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* responsive */
  @media (max-width: 500px) {
    .card { padding: 1.5rem; }
    h1 { font-size: 1.8rem; }
    .code { font-size: 1.4rem; letter-spacing: 3px; }
    .action-row { flex-wrap: wrap; }
    .toast { white-space: normal; text-align: center; max-width: 85%; }
  }

  /* back button */
  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 0.85rem;
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 20;
    transition: 0.2s;
  }

  .back-btn:hover {
    background: #00f2fe20;
    border-color: #00f2fe;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>

<div class="card">
  <div class="badge">
    <i class="fas fa-bolt"></i> JAMALI MD | PAIRING SYSTEM
  </div>
  <h1>Connect Device</h1>
  <div class="status-chip">
    <div class="pulse"></div>
    <span class="status-text" id="statusText">System Online · Ready</span>
  </div>

  <div class="input-group">
    <div class="input-icon">
      <i class="fas fa-phone-alt"></i>
      <input type="tel" id="number" value="255" placeholder="e.g., 255784062158" autocomplete="off">
    </div>
  </div>

  <button class="btn-primary" id="generateBtn">
    <i class="fas fa-key"></i> <span>GENERATE PAIRING CODE</span>
  </button>

  <div class="result-box" id="resultBox" onclick="copyCode()">
    <div class="result-label">⚡ PAIRING CODE</div>
    <div class="code" id="resultCode">—— —— ——</div>
    <div class="copy-hint"><i class="fas fa-copy"></i> tap to copy</div>
  </div>

  <div class="action-row">
    <button class="action-btn" onclick="toggleMusic()"><i class="fas fa-music"></i> Music</button>
    <button class="action-btn" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    <button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-cog"></i> Panel</button>
  </div>

  <footer>
    <i class="fas fa-crown"></i> Powered by <strong>JAMALI TECH TZ</strong> | © 2026
  </footer>
</div>

<div id="toastMsg" class="toast"></div>

<!-- audio element for bg music -->
<audio id="bgMusic" src="https://files.catbox.moe/iwpfp2.mp3" loop preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script>
  let musicPlaying = false;
  let isGenerating = false;
  const audio = document.getElementById('bgMusic');
  const generateBtn = document.getElementById('generateBtn');
  const numberInput = document.getElementById('number');
  const resultSpan = document.getElementById('resultCode');

  function showToast(msg, type = 'info') {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.color = type === 'error' ? '#ff6b6b' : '#00f2fe';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function toggleMusic() {
    if (musicPlaying) {
      audio.pause();
      musicPlaying = false;
      showToast('🔇 Music off', 'info');
    } else {
      audio.play().catch(e => console.log("autoplay blocked"));
      musicPlaying = true;
      showToast('🎵 Music on', 'info');
    }
  }

  function setButtonLoading(loading) {
    const btn = generateBtn;
    const span = btn.querySelector('span');
    if (loading) {
      isGenerating = true;
      btn.disabled = true;
      span.innerHTML = '<div class="spinner"></div> PROCESSING...';
    } else {
      isGenerating = false;
      btn.disabled = false;
      span.innerHTML = 'GENERATE PAIRING CODE';
    }
  }

  async function getCode() {
    if (isGenerating) return;

    let rawNumber = numberInput.value.trim();
    let cleanNumber = rawNumber.replace(/\D/g, '');
    if (cleanNumber.length < 9) {
      resultSpan.innerText = 'INVALID';
      showToast('Enter valid number with country code', 'error');
      return;
    }

    setButtonLoading(true);
    resultSpan.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';

    try {
      const response = await fetch(`/code?number=${cleanNumber}`);
      const data = await response.json();

      if (data.code) {
        resultSpan.innerText = data.code;
        showToast(`✅ Code for +${cleanNumber} generated!`, 'success');
      } else if (data.status === 'already_connected') {
        resultSpan.innerText = 'ALREADY ACTIVE';
        showToast(`Bot is already connected for +${cleanNumber}`, 'info');
      } else {
        resultSpan.innerText = 'FAILED';
        showToast(data.error || 'Pairing failed, try again', 'error');
      }
    } catch (err) {
      console.error(err);
      resultSpan.innerText = 'SERVER ERROR';
      showToast('Network error. Check your connection.', 'error');
    } finally {
      setButtonLoading(false);
    }
  }

  function copyCode() {
    let codeText = resultSpan.innerText;
    if (!codeText || codeText === '—— —— ——' || codeText === 'INVALID' || codeText === 'FAILED' || codeText === 'SERVER ERROR' || codeText === 'ALREADY ACTIVE' || isGenerating) {
      showToast('No valid code to copy', 'error');
      return;
    }
    navigator.clipboard.writeText(codeText).then(() => {
      const original = resultSpan.innerText;
      resultSpan.innerText = '✓ COPIED!';
      setTimeout(() => {
        resultSpan.innerText = original;
      }, 1200);
      showToast('Code copied to clipboard!', 'success');
    }).catch(() => showToast('Failed to copy', 'error'));
  }

  // Attach event
  generateBtn.onclick = getCode;
  // Allow enter key
  numberInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') getCode();
  });

  // Service Worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW registered')).catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
