<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD • ULTIMATE PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0c14;font-family:'Inter',sans-serif;color:#fff}
        .app{display:flex;min-height:100vh}
        /* SIDEBAR */
        .sidebar{width:260px;background:#0c0f1a;border-right:1px solid #00f6ff30;padding:30px 20px;position:fixed;height:100vh}
        .logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#00f6ff,#b400ff);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;margin-bottom:40px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:16px;margin-bottom:8px;cursor:pointer;transition:0.2s}
        .nav-item i{width:24px}
        .nav-item.active,.nav-item:hover{background:#00f6ff20;color:#00f6ff}
        /* MAIN */
        .main{margin-left:260px;flex:1;padding:30px}
        /* GLASS CARD */
        .glass{background:rgba(12,15,30,0.6);backdrop-filter:blur(12px);border-radius:28px;border:1px solid #00f6ff20;padding:24px;margin-bottom:25px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#0f1222;border-radius:24px;padding:20px;text-align:center;border:1px solid #1f2330}
        .stat-value{font-size:2.5rem;font-weight:800;color:#00f6ff}
        /* BUTTONS */
        .btn{background:linear-gradient(95deg,#00c6fb,#005bea);border:none;border-radius:60px;padding:12px 24px;color:white;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .btn-outline{background:transparent;border:1px solid #00f6ff}
        /* INPUT */
        .input{background:#05080f;border:1px solid #2a2f50;border-radius:60px;padding:14px 20px;color:white;width:100%;outline:none}
        .code-box{background:#000000aa;border-radius:28px;padding:20px;text-align:center;border:1px solid #b400ff;cursor:pointer}
        .code{font-size:2rem;letter-spacing:6px;color:#b400ff;font-weight:800}
        table{width:100%;border-collapse:collapse}
        th,td{padding:14px;text-align:left;border-bottom:1px solid #1f2330}
        th{color:#00f6ff}
        .badge{background:#00ff8820;color:#0f0;padding:4px 12px;border-radius:40px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#111;padding:10px 20px;border-radius:40px;transition:0.3s;z-index:1000}
        .toast.show{transform:translateX(-50%) translateY(0)}
        @media (max-width:800px){.sidebar{width:80px;padding:20px 10px}.sidebar .logo{font-size:0}.sidebar .logo i{font-size:1.8rem}.nav-item span{display:none}.main{margin-left:80px}}
    </style>
</head>
<body>
<div id="toast" class="toast">Copied!</div>
<div id="root" style="display:flex"></div>

<script>
    // =============== CONFIG ===============
    const ADMIN_USER = "Jamalitz";
    const ADMIN_PASS = "JAMALITECH@@@1234";
    let page = "pair";
    let auth = false;
    let sessions = [];

    // Helper
    function toast(msg, type="info") {
        let el = document.getElementById("toast");
        el.innerText = msg;
        el.style.borderLeftColor = type==="error" ? "#ff4444" : "#00f6ff";
        el.classList.add("show");
        setTimeout(()=>el.classList.remove("show"),3000);
    }

    async function loadSessions() {
        try {
            let res = await fetch("/active");
            let data = await res.json();
            sessions = data.numbers || [];
        } catch(e) { sessions = []; }
        return sessions;
    }

    async function fetchUptime(num) {
        try {
            let res = await fetch(`/status?number=${num}`);
            let data = await res.json();
            return (data.uptime || 0)+"s";
        } catch(e) { return "--"; }
    }

    // =============== RENDER ===============
    async function render() {
        await loadSessions();
        let mainHtml = "";

        // PAIR PAGE
        if(page === "pair") {
            mainHtml = `
                <div style="max-width:550px;margin:0 auto">
                    <div class="glass">
                        <h2 style="text-align:center"><i class="fas fa-link"></i> PAIR DEVICE</h2>
                        <div style="background:#0a0d1a;border-radius:16px;padding:12px;margin:20px 0">
                            <div>👑 Owner: <strong>JAMALI TECH TZ</strong> <a href="https://wa.me/255784062158" style="color:#0f0">+255784062158</a></div>
                            <div>📢 Channel: <a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank" style="color:#0f0">Join</a></div>
                        </div>
                        <input type="tel" id="pairNumber" class="input" placeholder="255784062158" value="255">
                        <button id="pairBtn" class="btn" style="width:100%;margin:20px 0"><i class="fas fa-key"></i> GENERATE CODE</button>
                        <div id="qrContainer" style="display:flex;justify-content:center;margin-bottom:15px"></div>
                        <div class="code-box" id="codeBox">
                            <div class="code" id="pairCode">—— —— ——</div>
                            <div style="font-size:0.7rem"><i class="fas fa-copy"></i> tap to copy</div>
                        </div>
                    </div>
                </div>
            `;
        }
        // DASHBOARD (user)
        else if(page === "dashboard") {
            let rows = sessions.length===0 ? "<tr><td colspan='4'>No active bots</td></tr>" : "";
            for(let num of sessions) {
                let uptime = await fetchUptime(num);
                rows += `<tr><td>${num}</td><td><span class="badge">● ONLINE</span></td><td>${uptime}</td><td><button class="btn-outline btn" onclick="disconnectNum('${num}')">Disconnect</button></td></tr>`;
            }
            mainHtml = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>My Bots</div></div>
                    <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
                </div>
                <div class="glass">
                    <h3><i class="fas fa-server"></i> Your Sessions</h3>
                    <div style="overflow-x:auto"><td><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>
                </div>
            `;
        }
        // ADMIN PANEL
        else if(page === "admin") {
            if(!auth) {
                mainHtml = `<div class="glass" style="max-width:400px;margin:auto"><h2>ADMIN LOGIN</h2><input id="adminUser" class="input" placeholder="Username"><input id="adminPass" type="password" class="input" placeholder="Password" style="margin-top:15px"><button id="loginBtn" class="btn" style="margin-top:20px">LOGIN</button></div>`;
            } else {
                let rows = "";
                for(let num of sessions) {
                    let uptime = await fetchUptime(num);
                    rows += `<tr><td>${num}</td><td><span class="badge">● ONLINE</span></td><td>${uptime}</td><td><button class="btn-outline btn" onclick="togglePremium('${num}')">Premium</button></td><td><button class="btn-outline btn" onclick="disconnectNum('${num}')">Disconnect</button></td></tr>`;
                }
                mainHtml = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Total Bots</div></div>
                    </div>
                    <div class="glass">
                        <div style="display:flex;gap:15px;margin-bottom:20px"><button class="btn" onclick="reconnectAll()">Reconnect All</button><button class="btn-outline btn" onclick="disconnectAll()">Disconnect All</button></div>
                        <table style="width:100%"><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Premium</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>
                    </div>
                `;
            }
        }

        // Sidebar + main
        const sidebar = `
            <div class="sidebar">
                <div class="logo"><i class="fas fa-bolt"></i> JAMALI MD</div>
                <div class="nav-item ${page==='pair'?'active':''}" data-page="pair"><i class="fas fa-link"></i><span>Pair</span></div>
                <div class="nav-item ${page==='dashboard'?'active':''}" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
                <div class="nav-item ${page==='admin'?'active':''}" data-page="admin"><i class="fas fa-shield-alt"></i><span>Admin</span></div>
            </div>
            <div class="main">${mainHtml}</div>
        `;
        document.getElementById("root").innerHTML = sidebar;

        // Attach events
        document.querySelectorAll(".nav-item").forEach(el=>{
            el.onclick = ()=>{ page = el.getAttribute("data-page"); render(); };
        });
        if(page === "pair") attachPair();
        if(page === "admin" && !auth) attachAdminLogin();
    }

    function attachPair() {
        const btn = document.getElementById("pairBtn");
        if(btn) btn.onclick = async () => {
            let num = document.getElementById("pairNumber").value.replace(/\D/g,'');
            if(num.length<9) { toast("Invalid number","error"); return; }
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ...';
            btn.disabled = true;
            let codeDiv = document.getElementById("pairCode");
            codeDiv.innerText = "⏳";
            try {
                let res = await fetch(`/code?number=${num}`);
                let data = await res.json();
                if(data.code) { codeDiv.innerText = data.code; toast("Code generated"); }
                else if(data.status === "already_connected") { codeDiv.innerText = "ALREADY ACTIVE"; toast("Already connected","error"); }
                else { codeDiv.innerText = "FAILED"; toast("Failed","error"); }
            } catch(e) { codeDiv.innerText = "ERROR"; toast("Server error","error"); }
            btn.innerHTML = '<i class="fas fa-key"></i> GENERATE CODE';
            btn.disabled = false;
        };
        const codeBox = document.getElementById("codeBox");
        if(codeBox) codeBox.onclick = () => {
            let code = document.getElementById("pairCode").innerText;
            if(code && code!=="—— —— ——" && code!=="FAILED" && code!=="ERROR" && code!=="ALREADY ACTIVE") {
                navigator.clipboard.writeText(code);
                toast("Copied!");
            } else toast("No code to copy","error");
        };
    }

    function attachAdminLogin() {
        const loginBtn = document.getElementById("loginBtn");
        if(loginBtn) loginBtn.onclick = () => {
            let u = document.getElementById("adminUser").value;
            let p = document.getElementById("adminPass").value;
            if(u===ADMIN_USER && p===ADMIN_PASS) { auth=true; render(); }
            else toast("Wrong credentials","error");
        };
    }

    // Global functions
    window.disconnectNum = async (num) => {
        if(confirm(`Disconnect ${num}?`)) { await fetch(`/disconnect?number=${num}`); toast("Disconnected"); render(); }
    };
    window.reconnectAll = async () => { await fetch("/connect-all"); toast("Reconnecting..."); setTimeout(()=>render(),2500); };
    window.disconnectAll = async () => { if(confirm("Disconnect ALL bots?")) { await fetch("/disconnect-all"); toast("All disconnected"); render(); } };
    window.togglePremium = async (num) => {
        try {
            let res = await fetch(`/api/config?number=${num}`);
            let cfg = await res.json();
            let newPremium = cfg.premium==='true'?'false':'true';
            await fetch("/api/config/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:num,config:{premium:newPremium}})});
            toast(`Premium ${newPremium==='true'?'enabled':'disabled'} for ${num}`);
            render();
        } catch(e) { toast("Error","error"); }
    };

    render();
</script>
</body>
</html>
