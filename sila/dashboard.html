<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI MD | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a,#0a0f1a,#000428);font-family:'Inter',sans-serif;color:#fff}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .header{background:rgba(10,10,20,0.6);backdrop-filter:blur(20px);border-radius:2rem;padding:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:15px;margin-bottom:30px}
        .logo h1{font-size:1.8rem;background:linear-gradient(135deg,#00f6ff,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stats{display:flex;gap:15px}
        .stat-card{background:rgba(0,0,0,0.5);border:1px solid rgba(0,246,255,0.2);border-radius:1.5rem;padding:12px 24px;text-align:center}
        .stat-number{font-size:2rem;color:#00f6ff}
        .nav-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-bottom:40px}
        .nav-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:2rem;padding:30px;text-align:center;cursor:pointer;transition:0.3s}
        .nav-card:hover{transform:translateY(-8px);border-color:#00f6ff}
        .nav-icon{font-size:3rem;margin-bottom:15px}
        .sessions-section{background:rgba(255,255,255,0.03);border-radius:2rem;padding:25px;overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th,td{padding:15px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1)}
        th{color:#00f6ff}
        .status-badge{background:rgba(0,255,136,0.2);color:#00ff88;padding:4px 12px;border-radius:40px}
        .action-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;margin:0 5px;color:#aaa}
        .action-btn:hover{color:#00f6ff}
        .footer{text-align:center;padding:20px;opacity:0.6}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>⚡ JAMALI MD</h1><p>WhatsApp Bot Dashboard</p></div>
        <div class="stats"><div class="stat-card"><div class="stat-number" id="totalSessions">0</div><div>Sessions</div></div><div class="stat-card"><div class="stat-number" id="activeSessions">0</div><div>Active</div></div></div>
    </div>
    <div class="nav-grid">
        <div class="nav-card" onclick="location.href='/pair'"><div class="nav-icon">🔗</div><h3>Pair Device</h3><p>Connect new WhatsApp bot</p></div>
        <div class="nav-card" onclick="location.href='/config'"><div class="nav-icon">⚙️</div><h3>Bot Config</h3><p>Adjust settings</p></div>
        <div class="nav-card" onclick="window.open('https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h','_blank')"><div class="nav-icon">📢</div><h3>Channel</h3><p>Join updates</p></div>
    </div>
    <div class="sessions-section"><h3><i class="fas fa-server"></i> Your Active Sessions</h3><div style="overflow-x:auto; margin-top:20px"><table id="sessionsTable"><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Actions</th></tr></thead><tbody id="sessionsBody"><tr><td colspan="4">Loading...</td></tr></tbody></table></div></div>
    <div class="footer">Powered by JAMALI TECH TZ | © 2026</div>
</div>
<script>
async function loadSessions(){
    try{
        const res=await fetch('/active');
        const data=await res.json();
        document.getElementById('totalSessions').innerText=data.count||0;
        document.getElementById('activeSessions').innerText=data.count||0;
        const tbody=document.getElementById('sessionsBody');
        if(data.numbers && data.numbers.length){
            tbody.innerHTML='';
            for(let num of data.numbers){
                const statusRes=await fetch(`/status?number=${num}`);
                const statusData=await statusRes.json();
                const row=tbody.insertRow();
                row.innerHTML=`<td>${num}</td><td><span class="status-badge">● ONLINE</span></td><td>${statusData.uptime||0}s</td><td><button class="action-btn" onclick="viewSession('${num}')"><i class="fas fa-eye"></i></button><button class="action-btn" onclick="disconnectSession('${num}')"><i class="fas fa-power-off"></i></button></td>`;
            }
        } else tbody.innerHTML='<tr><td colspan="4">No active sessions. Use Pair Device.</td></tr>';
    } catch(e){ console.error(e); }
}
function viewSession(num){ window.location.href=`/config?number=${num}`; }
async function disconnectSession(num){ if(confirm(`Disconnect ${num}?`)){ await fetch(`/disconnect?number=${num}`); loadSessions(); } }
loadSessions(); setInterval(loadSessions,10000);
</script>
</body>
    </html>
