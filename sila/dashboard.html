<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(circle at 10% 20%,#050b1a,#010105);font-family:'Inter',sans-serif;color:#fff;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        .glass-card{background:rgba(12,15,30,0.6);backdrop-filter:blur(12px);border-radius:28px;border:1px solid rgba(0,246,255,0.2);padding:24px;margin-bottom:25px}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
        h1{font-size:1.8rem;background:linear-gradient(135deg,#fff,#00f6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
        .btn-group{display:flex;gap:12px}
        .btn-neon{background:linear-gradient(95deg,#00c6fb,#005bea);border:none;border-radius:60px;padding:12px 24px;font-weight:600;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .btn-outline{background:transparent;border:1px solid #00f6ff;color:#00f6ff}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0}
        .stat-card{background:#0f1222;border-radius:24px;padding:20px;text-align:center;border:1px solid #1f2330}
        .stat-value{font-size:2.5rem;color:#00f6ff;font-weight:700}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #1f2330}
        th{color:#00f6ff}
        .badge-online{background:#00ff8820;color:#0f0;padding:4px 12px;border-radius:40px}
        .disconnect-btn{background:transparent;border:1px solid #ff4444;color:#ff4444;border-radius:40px;padding:4px 12px;cursor:pointer}
        .footer{text-align:center;margin-top:40px;opacity:0.6}
        @media(max-width:700px){.stats{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <div class="header">
            <h1><i class="fas fa-bolt"></i> JAMALI MD • DASHBOARD</h1>
            <div class="btn-group">
                <button class="btn-neon" onclick="location.href='/pair'"><i class="fas fa-link"></i> PAIR DEVICE</button>
                <button class="btn-neon btn-outline" onclick="location.href='/admin-panel'"><i class="fas fa-shield-alt"></i> ADMIN</button>
            </div>
        </div>
        <div class="stats" id="stats"></div>
    </div>
    <div class="glass-card">
        <h3><i class="fas fa-server"></i> Active Bot Sessions (All)</h3>
        <div id="sessionsList" style="overflow-x:auto; margin-top:15px"></div>
    </div>
    <div class="footer">Powered by JAMALI TECH TZ | Multi‑server ready</div>
</div>

<script>
    async function fetchData() {
        try {
            const res = await fetch('/active');
            const data = await res.json();
            const sessions = data.numbers || [];
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Total Bots</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length > 0 ? '✅' : '⏳'}</div><div>Online</div></div>
            `;
            let html = `<table class="cyber-table"><thead><tr><th>#</th><th>Number</th><th>Status</th><th>Uptime</th><th>Action</th></tr></thead><tbody>`;
            for (let i = 0; i < sessions.length; i++) {
                const num = sessions[i];
                let uptime = '--';
                try {
                    const sRes = await fetch(`/status?number=${num}`);
                    const sData = await sRes.json();
                    uptime = (sData.uptime || 0) + 's';
                } catch(e) {}
                html += `<tr>
                            <td>${i+1}</td>
                            <td>${num}</td>
                            <td><span class="badge-online">● ONLINE</span></td>
                            <td>${uptime}</td>
                            <td><button class="disconnect-btn" onclick="disconnectBot('${num}')">Disconnect</button></td>
                         </tr>`;
            }
            if (sessions.length === 0) html += '<tr><td colspan="5">No active bots. Use Pair Device.</td></tr>';
            html += `</tbody></table>`;
            document.getElementById('sessionsList').innerHTML = html;
        } catch(e) { console.error(e); }
    }
    window.disconnectBot = async (num) => {
        if(confirm(`Disconnect bot for ${num}?`)){
            await fetch(`/disconnect?number=${num}`);
            fetchData();
        }
    };
    fetchData();
    setInterval(fetchData, 10000);
</script>
</body>
</html>
