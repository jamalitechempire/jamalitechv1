<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI MD | User Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a,#0a0f1a,#000428);font-family:'Inter',sans-serif;color:#fff;padding:20px}
        .container{max-width:700px;margin:auto}
        .card{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);border-radius:32px;border:1px solid rgba(0,246,255,0.2);padding:30px;margin-top:50px}
        h2{margin-bottom:25px}
        .setting-item{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
        .toggle-switch{position:relative;display:inline-block;width:52px;height:26px}
        .toggle-switch input{opacity:0;width:0;height:0}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:rgba(255,255,255,0.2);border-radius:34px;transition:0.3s}
        .slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background-color:white;border-radius:50%;transition:0.3s}
        input:checked + .slider{background:linear-gradient(135deg,#00f6ff,#b400ff)}
        input:checked + .slider:before{transform:translateX(26px)}
        .save-btn{background:linear-gradient(105deg,#00c6fb,#005bea);border:none;border-radius:40px;padding:12px;width:100%;margin-top:25px;cursor:pointer;color:white;font-weight:bold}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2><i class="fas fa-user-cog"></i> My Bot Preferences</h2>
        <div id="settingsForm"></div>
        <button class="save-btn" onclick="saveUserSettings()">Save Settings</button>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const botNumber = urlParams.get('number') || '';
    let currentSettings = {};

    async function loadUserSettings() {
        if(!botNumber) return;
        let res = await fetch(`/api/config?number=${botNumber}`);
        currentSettings = await res.json();
        renderToggles();
    }

    function renderToggles() {
        const fields = [
            {key:'AUTO_VIEW_STATUS', label:'Auto View Status'},
            {key:'AUTO_LIKE_STATUS', label:'Auto Like Status'},
            {key:'AUTO_REPLY_ENABLE', label:'Auto Reply'},
            {key:'ANTI_CALL', label:'Anti-Call'},
            {key:'ANTI_DELETE', label:'Anti-Delete'},
            {key:'READ_MESSAGE', label:'Read Receipts'},
            {key:'AUTO_TYPING', label:'Auto Typing'},
            {key:'AUTO_RECORDING', label:'Auto Recording'}
        ];
        let html = '';
        fields.forEach(f => {
            let checked = currentSettings[f.key] === 'true';
            html += `<div class="setting-item">
                        <span>${f.label}</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="${f.key}" ${checked ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>`;
        });
        document.getElementById('settingsForm').innerHTML = html;
    }

    async function saveUserSettings() {
        let updates = {};
        const keys = ['AUTO_VIEW_STATUS','AUTO_LIKE_STATUS','AUTO_REPLY_ENABLE','ANTI_CALL','ANTI_DELETE','READ_MESSAGE','AUTO_TYPING','AUTO_RECORDING'];
        keys.forEach(k => { updates[k] = document.getElementById(k).checked ? 'true' : 'false'; });
        let res = await fetch('/api/config/update', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ number: botNumber, config: updates })
        });
        if(res.ok) alert('Settings updated');
        else alert('Error');
    }

    if(botNumber) loadUserSettings();
    else document.querySelector('.card h2').innerHTML = '<i class="fas fa-ban"></i> No bot selected';
</script>
</body>
</html>
