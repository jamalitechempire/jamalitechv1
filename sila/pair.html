<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jamali Tech MD | Pair Code System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism card */
        .md-card {
            max-width: 550px;
            width: 100%;
            background: rgba(8, 18, 28, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Header section */
        .header {
            padding: 1.2rem 1.8rem 0.8rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #0ff, #6efff0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .lang-switch {
            display: flex;
            gap: 10px;
            background: #0a1422;
            padding: 5px 12px;
            border-radius: 60px;
            border: 0.5px solid #2c5f7a;
        }
        .lang-btn {
            background: transparent;
            border: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: #8a9fc0;
            transition: 0.2s;
            padding: 4px 10px;
            border-radius: 40px;
        }
        .lang-btn.active {
            background: #00ccff30;
            color: #0ff;
            text-shadow: 0 0 3px cyan;
            border: 0.5px solid cyan;
        }

        /* Main content */
        .content {
            padding: 1.8rem 1.8rem 2rem;
        }

        .pair-headline {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #7f9fbf;
            text-align: center;
            margin-bottom: 1rem;
        }

        .pair-code-box {
            background: #010a18e0;
            border-radius: 2rem;
            padding: 1rem;
            text-align: center;
            margin: 1rem 0 1.5rem;
            border: 1px solid #0ff33a50;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        .pair-label {
            font-size: 0.7rem;
            color: #8ab3cf;
            letter-spacing: 1px;
        }

        .pair-code {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #eef5ff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            word-break: break-all;
            letter-spacing: 2px;
        }

        /* input field */
        .input-group {
            margin: 1.5rem 0 1rem;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #b0d4ff;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .phone-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #0a1322;
            border-radius: 60px;
            padding: 5px 5px 5px 20px;
            border: 1px solid #2a4c6e;
            transition: 0.2s;
        }
        .phone-input-wrapper:focus-within {
            border-color: #0ff;
            box-shadow: 0 0 8px cyan;
        }
        .phone-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .generate-btn {
            background: linear-gradient(95deg, #0c5f7a, #0aa);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 10px rgba(0, 180, 200, 0.3);
        }
        .generate-btn:active {
            transform: scale(0.96);
        }

        /* bottom button row (alive, bot, user, music etc) */
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 20px;
        }
        .feature-btn {
            background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #2c6f8f;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #bbf0ff;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .feature-btn:active {
            background: #0ff22a20;
            transform: scale(0.95);
            color: white;
            border-color: cyan;
        }
        .special {
            background: #0d3f55;
            border-color: cyan;
            color: white;
        }

        .footer {
            background: #020a12aa;
            padding: 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #3e6d8c;
            border-top: 1px solid #0a2a3a;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a1f2fdd;
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 60px;
            color: cyan;
            font-size: 0.8rem;
            border: 1px solid cyan;
            pointer-events: none;
            z-index: 999;
            transition: 0.2s;
            opacity: 0;
        }
        .toast-msg.show {
            opacity: 1;
        }
        @media (max-width: 480px) {
            .pair-code { font-size: 1.8rem; }
            .action-grid { gap: 8px; }
            .feature-btn { padding: 6px 12px; font-size: 0.7rem; }
        }
        hr {
            border-color: #1a4058;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="md-card">
    <div class="header">
        <span class="title">⚡ JAMALI TECH MD</span>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sw">SW</button>
        </div>
    </div>

    <div class="content">
        <div class="pair-headline" id="pairHeadline">🔐 PAIR CODE SYSTEM</div>

        <!-- Pairing code display (JAMALITZ) -->
        <div class="pair-code-box">
            <div class="pair-label">📲 PAIRING CODE</div>
            <div class="pair-code" id="pairingCodeDisplay">JAMALITZ</div>
            <div style="font-size: 0.7rem; margin-top: 6px; color: #5f9fbf;">⚡ Device Sync Ready</div>
        </div>

        <!-- WhatsApp Number + Generate -->
        <div class="input-group">
            <label id="phoneLabel">📞 WhatsApp Number</label>
            <div class="phone-input-wrapper">
                <input type="tel" id="whatsappNumber" placeholder="e.g., 255712345678" value="">
                <button class="generate-btn" id="generateBtn">GENERATE</button>
            </div>
        </div>

        <!-- Action buttons row: Alive, Bot, User, Music ON/OFF, Overlay, CT Owner -->
        <div class="action-grid">
            <button class="feature-btn" data-action="alive">💚 ALIVE</button>
            <button class="feature-btn" data-action="bot">🤖 BOT</button>
            <button class="feature-btn" data-action="user">👤 USER</button>
            <button class="feature-btn" data-action="music">🎵 MUSIC ON/OFF</button>
            <button class="feature-btn" data-action="overlay">🖼️ OVERLAY</button>
            <button class="feature-btn special" data-action="ctowner">👑 CT OWNER</button>
        </div>

        <!-- subtle info -->
        <hr>
        <div style="text-align: center; font-size: 0.7rem; color:#4d799b; margin-top: 12px;">
            JAMALI TECH MD • PREMIUM FRAMEWORK
        </div>
    </div>
    <div class="footer">
        © 2026 JAMALI TECH EMPIRE | v2.0 PRO | 24/7 Active
    </div>
</div>

<div id="toastMsg" class="toast-msg">✨ Pairing code ready</div>

<script>
    // Language dictionary
    const translations = {
        en: {
            headline: "🔐 PAIR CODE SYSTEM",
            phoneLabel: "📞 WhatsApp Number",
            generate: "GENERATE",
            pairCodeLabel: "PAIRING CODE",
            toastPair: "✅ Pairing code JAMALITZ is active!",
            toastGenerate: "🔁 Pairing request sent! Use code JAMALITZ",
            aliveMsg: "🤖 BOT is alive and running smoothly",
            botMsg: "⚙️ Bot commands activated",
            userMsg: "👤 User profile synced",
            musicMsg: "🎵 Music mode toggled",
            overlayMsg: "🖼️ Overlay UI triggered",
            ctOwnerMsg: "👑 Contacting CT Owner..."
        },
        sw: {
            headline: "🔐 MFUMO WA PAIR CODE",
            phoneLabel: "📞 Namba ya WhatsApp",
            generate: "ZALISHA",
            pairCodeLabel: "CODE YA KUOANISHA",
            toastPair: "✅ Code ya kuoanisha JAMALITZ iko tayari!",
            toastGenerate: "🔁 Ombi la kuoanisha limetumwa! Tumia code JAMALITZ",
            aliveMsg: "🤖 Bot iko hai na inafanya kazi vizuri",
            botMsg: "⚙️ Amri za bot zimewashwa",
            userMsg: "👤 Profaili ya mtumiaji imelandanishwa",
            musicMsg: "🎵 Hali ya muziki imebadilishwa",
            overlayMsg: "🖼️ Overlay imeamilishwa",
            ctOwnerMsg: "👑 Inawasiliana na Mmiliki wa CT..."
        }
    };

    let currentLang = 'en';

    // DOM elements
    const headlineEl = document.getElementById('pairHeadline');
    const phoneLabelEl = document.getElementById('phoneLabel');
    const generateBtnText = document.getElementById('generateBtn');
    const pairingCodeSpan = document.getElementById('pairingCodeDisplay');
    const toastDiv = document.getElementById('toastMsg');

    function showToast(message, duration = 2500) {
        toastDiv.textContent = message;
        toastDiv.classList.add('show');
        setTimeout(() => {
            toastDiv.classList.remove('show');
        }, duration);
    }

    function updateLanguage() {
        const t = translations[currentLang];
        headlineEl.textContent = t.headline;
        phoneLabelEl.textContent = t.phoneLabel;
        generateBtnText.textContent = t.generate;
        // pairing code label is inside pair-code-box, but we can update dynamic text if needed
        const pairLabelSpan = document.querySelector('.pair-label');
        if (pairLabelSpan && currentLang === 'sw') {
            pairLabelSpan.innerHTML = "📲 CODE YA KUOANISHA";
        } else if (pairLabelSpan) {
            pairLabelSpan.innerHTML = "📲 PAIRING CODE";
        }
        // small extra: keep pairing code display unchanged (JAMALITZ)
    }

    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.getAttribute('data-lang');
            updateLanguage();
            showToast(currentLang === 'en' ? "🌐 Language: English" : "🌐 Lugha: Kiswahili", 1200);
        });
    });

    // GENERATE pairing code action – static code "JAMALITZ" but we mimic backend pairing
    const generateBtn = document.getElementById('generateBtn');
    const phoneInput = document.getElementById('whatsappNumber');

    function simulatePairing() {
        let phone = phoneInput.value.trim();
        if (!phone) {
            showToast(currentLang === 'en' ? "⚠️ Please enter WhatsApp number" : "⚠️ Tafadhali ingiza namba ya WhatsApp", 2000);
            return;
        }
        // basic validation
        const cleanPhone = phone.replace(/\D/g, '');
        if (cleanPhone.length < 9) {
            showToast(currentLang === 'en' ? "❌ Invalid number" : "❌ Namba si sahihi", 2000);
            return;
        }
        // pairing code remains JAMALITZ as requested
        pairingCodeSpan.innerText = "JAMALITZ";
        // extra effect: show toast based on language
        const t = translations[currentLang];
        showToast(t.toastGenerate || "Pairing code JAMALITZ is ready! Use it on WhatsApp.", 2800);
        // also optionally send a simulated alert
        console.log(`[PAIRING] phone: ${phone}, code: JAMALITZ`);
        // you can also trigger a custom event if you integrate later with real backend
    }

    generateBtn.addEventListener('click', simulatePairing);
    // pressing enter on input also triggers
    phoneInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') simulatePairing();
    });

    // Action buttons features (ALIVE, BOT, USER, MUSIC ON/OFF, OVERLAY, CT OWNER)
    const actionMap = {
        alive: () => showToast(translations[currentLang].aliveMsg, 2000),
        bot: () => showToast(translations[currentLang].botMsg, 2000),
        user: () => showToast(translations[currentLang].userMsg, 2000),
        music: () => showToast(translations[currentLang].musicMsg, 2000),
        overlay: () => showToast(translations[currentLang].overlayMsg, 2000),
        ctowner: () => showToast(translations[currentLang].ctOwnerMsg, 2000)
    };

    document.querySelectorAll('.feature-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.getAttribute('data-action');
            if (action && actionMap[action]) {
                actionMap[action]();
                // extra haptic / animation
                btn.style.transform = "scale(0.95)";
                setTimeout(() => { btn.style.transform = ""; }, 150);
            } else {
                showToast("✨ Feature coming soon", 1200);
            }
        });
    });

    // Initial pairing code display force JAMALITZ always
    pairingCodeSpan.innerText = "JAMALITZ";

    // Also the QR code / Pairing style is similar to image: we show "JAMALITZ"
    // In case you want dynamic generation based on phone number we keep core "JAMALITZ"
    // Option to mimic "JAMALITZ" + last digits but not needed, but user wants exactly JAMALITZ

    // Add micro interaction: when page loads, show pairing ready
    window.addEventListener('load', () => {
        updateLanguage();
        showToast(currentLang === 'en' ? "✅ Pairing system ready • Code: JAMALITZ" : "✅ Mfumo wa kuoanisha uko tayari • Msimbo: JAMALITZ", 2000);
    });
</script>
</body>
</html>
