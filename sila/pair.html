<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>⚡ JAMALI MD | Pair Device</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at 10% 20%, #0a0f1e, #03050b); font-family:'Space Grotesk',sans-serif; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
.card{max-width:500px; width:100%; background:rgba(12,15,25,0.65); backdrop-filter:blur(16px); border-radius:2rem; border:1px solid rgba(0,242,254,0.25); padding:2rem; box-shadow:0 25px 45px -12px rgba(0,0,0,0.5); text-align:center}
.bot-img{width:110px; height:110px; margin:0 auto 20px; display:block; border-radius:50%; border:3px solid #00f6ff; box-shadow:0 0 20px #00f6ff80; object-fit:cover}
h1{font-size:2rem; background:linear-gradient(135deg,#00f6ff,#b400ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px}
.info-row{display:flex; justify-content:space-between; background:rgba(0,0,0,0.4); padding:12px 20px; border-radius:50px; margin:15px 0; font-size:0.9rem; text-align:left}
.info-row a{color:#00ff88; text-decoration:none; word-break:break-all}
.status{display:flex; align-items:center; justify-content:center; gap:8px; margin:20px 0}
.dot{width:10px; height:10px; background:#0f0; border-radius:50%; animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.input-group{position:relative; margin:25px 0}
.input-group i{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:#00f6ff}
input{width:100%; padding:16px 20px 16px 50px; background:rgba(0,0,0,0.5); border:1.5px solid rgba(0,242,254,0.3); border-radius:50px; color:#fff; font-size:1rem; outline:none}
input:focus{border-color:#00f6ff}
button.primary{width:100%; background:linear-gradient(105deg,#00c6fb,#005bea); border:none; border-radius:50px; padding:16px; font-weight:700; color:#fff; font-size:1rem; cursor:pointer; margin-bottom:25px; transition:0.3s}
button.primary:hover{transform:scale(1.02); box-shadow:0 0 20px #00c6fb}
.result-box{background:rgba(0,0,0,0.4); border-radius:2rem; padding:20px; text-align:center; border:1px solid #b400ff; cursor:pointer; transition:0.2s}
.result-box:hover{border-color:#00f6ff}
.result-code{font-size:2rem; letter-spacing:8px; color:#b400ff; font-weight:700}
.copy-hint{font-size:0.7rem; margin-top:8px; opacity:0.6}
.footer{text-align:center; margin-top:25px; font-size:0.7rem; opacity:0.5}
.toast{position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#111; padding:10px 20px; border-radius:40px; transition:0.3s; z-index:1000; font-size:0.9rem}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="card">
    <img src="https://files.catbox.moe/0e3rok.jpg" alt="JAMALI MD Logo" class="bot-img">
    <h1>⚡ JAMALI MD</h1>
    
    <div class="info-row">
        <span><i class="fas fa-crown"></i> Owner</span>
        <span><strong>JAMALI TECH TZ</strong> <i class="fab fa-whatsapp" style="color:#25D366"></i> <a href="https://wa.me/255784062158">+255 784 062 158</a></span>
    </div>
    <div class="info-row">
        <span><i class="fas fa-hashtag"></i> Channel</span>
        <span><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank"><i class="fab fa-whatsapp"></i> Join Official Channel</a></span>
    </div>
    
    <div class="status"><div class="dot"></div><span>SYSTEM READY</span></div>
    
    <div class="input-group"><i class="fas fa-phone-alt"></i><input type="tel" id="number" value="255" placeholder="Enter number with country code (e.g., 255784062158)"></div>
    <button class="primary" id="genBtn"><i class="fas fa-key"></i> GENERATE PAIRING CODE</button>
    <div class="result-box" onclick="copyCode()">
        <div class="result-code" id="resultCode">—— —— ——</div>
        <div class="copy-hint"><i class="fas fa-copy"></i> tap to copy</div>
    </div>
    <div class="footer">Powered by JAMALI TECH TZ | © 2026</div>
</div>
<audio id="bgMusic" src="https://files.catbox.moe/iwpfp2.mp3" loop></audio>
<div id="toast" class="toast"></div>
<script>
let isGenerating=false;
const audio=document.getElementById('bgMusic');
function showToast(msg){ let t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
async function getCode(){
    if(isGenerating) return;
    let num=document.getElementById('number').value.replace(/\D/g,'');
    if(num.length<9){ showToast('Invalid number – use country code like 255...'); return; }
    isGenerating=true; let btn=document.getElementById('genBtn'); btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> PROCESSING...'; btn.disabled=true;
    let resultDiv=document.getElementById('resultCode'); resultDiv.innerHTML='<i class="fas fa-spinner fa-pulse"></i>';
    try{
        let res=await fetch(`/code?number=${num}`);
        let data=await res.json();
        if(data.code){ resultDiv.innerText=data.code; showToast('✅ Pairing code generated'); }
        else if(data.status==='already_connected'){ resultDiv.innerText='ALREADY ACTIVE'; showToast('Bot is already connected'); }
        else { resultDiv.innerText='FAILED'; showToast(data.error||'Failed to generate code'); }
    } catch(e){ resultDiv.innerText='ERROR'; showToast('Server error. Is the bot running?'); }
    finally{ isGenerating=false; btn.innerHTML='<i class="fas fa-key"></i> GENERATE PAIRING CODE'; btn.disabled=false; }
}
function copyCode(){ let code=document.getElementById('resultCode').innerText; if(code && !code.includes('——') && code!=='ALREADY ACTIVE' && code!=='FAILED' && code!=='ERROR'){ navigator.clipboard.writeText(code); showToast('Copied to clipboard!'); } else showToast('No valid code to copy'); }
document.getElementById('genBtn').onclick=getCode;
</script>
</body>
</html>
