<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: rgba(12,15,25,0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(0,242,254,0.3);
            padding: 40px 30px;
            text-align: center;
        }
        .login-card h2 {
            background: linear-gradient(135deg,#00f6ff,#b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,242,254,0.3);
            border-radius: 40px;
            color: #fff;
            margin: 12px 0;
            outline: none;
        }
        .login-card button {
            width: 100%;
            background: linear-gradient(105deg,#00c6fb,#005bea);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            margin-top: 20px;
        }
        .error-msg { color: #ff6666; margin-top: 10px; }
        
        /* Dashboard (hidden initially) */
        .dashboard-container {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin: 20px;
        }
        .sidebar {
            width: 260px;
            background: rgba(5,10,20,0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,246,255,0.2);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg,#00f6ff,#b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 40px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 10px;
            color: #aaa;
            transition: 0.3s;
            cursor: pointer;
        }
        .nav-item.active, .nav-item:hover {
            background: rgba(0,246,255,0.15);
            color: #00f6ff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,246,255,0.2);
            border-radius: 28px;
            padding: 24px;
        }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #00f6ff; }
        .sessions-table {
            background: rgba(255,255,255,0.02);
            border-radius: 28px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #00f6ff; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin: 0 5px; }
        .global-btn { background: linear-gradient(135deg, #00f6ff, #b400ff); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; color: #000; margin-right: 10px; }
        .global-btn.danger { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; padding: 10px 20px; border-radius: 40px; z-index: 1000; display: none; }
        @media (max-width: 768px) { .sidebar { width: 80px; } .sidebar .logo { font-size: 0; } .sidebar .logo::after { content: "JM"; font-size: 1.5rem; } .nav-item span { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginContainer" style="width:100%; display: flex; justify-content: center;">
    <div class="login-card">
        <h2><i class="fas fa-shield-alt"></i> ADMIN ACCESS</h2>
        <input type="text" id="adminUser" placeholder="Username" autocomplete="off">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="doLogin()">LOGIN</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- DASHBOARD (hidden until login) -->
<div id="dashboardMain" class="dashboard-container">
    <div class="sidebar">
        <div class="logo">JAMALI MD</div>
        <div class="nav-item active" onclick="showSection('overview')"><i class="fas fa-tachometer-alt"></i><span>Overview</span></div>
        <div class="nav-item" onclick="showSection('sessions')"><i class="fas fa-server"></i><span>Sessions</span></div>
        <div class="nav-item" onclick="showSection('premium')"><i class="fas fa-gem"></i><span>Premium</span></div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
    </div>
    <div class="main-content">
        <div id="overviewSection">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">Total Bots</div><div class="stat-value" id="totalBots">0</div></div>
                <div class="stat-card"><div class="stat-title">Active Now</div><div class="stat-value" id="activeBots">0</div></div>
                <div class="stat-card"><div class="stat-title">Premium Bots</div><div class="stat-value" id="premiumCount">0</div></div>
            </div>
            <div class="global-actions" style="margin-bottom:20px">
                <button class="global-btn" onclick="reconnectAll()"><i class="fas fa-sync-alt"></i> Reconnect All</button>
                <button class="global-btn danger" onclick="disconnectAll()"><i class="fas fa-power-off"></i> Disconnect All</button>
                <button class="global-btn" onclick="refreshData()"><i class="fas fa-refresh"></i> Refresh</button>
            </div>
        </div>
        <div id="sessionsSection" style="display:none">
            <div class="sessions-table">
                <h3><i class="fas fa-microchip"></i> Active Bot Sessions</h3>
                <table id="sessionsTable">
                    <thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Messages</th><th>Commands</th><th>Premium</th><th>Actions</th></tr></thead>
                    <tbody id="sessionsBody"><tr><td colspan="7">Loading...</td</tr></tbody>
                </table>
            </div>
        </div>
        <div id="premiumSection" style="display:none">
            <div class="sessions-table">
                <h3><i class="fas fa-crown"></i> Manage Premium Bots</h3>
                <p style="margin:15px 0">Toggle premium status for any connected bot</p>
                <table id="premiumTable">
                    <thead><tr><th>Number</th><th>Current Status</th><th>Action</th></tr></thead>
                    <tbody id="premiumBody"><td><td colspan="3">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    // Fixed credentials
    const ADMIN_USER = "Jamalitz";
    const ADMIN_PASS = "JAMALITECH@@@1234";

    function doLogin() {
        let user = document.getElementById('adminUser').value;
        let pass = document.getElementById('adminPass').value;
        if(user === ADMIN_USER && pass === ADMIN_PASS) {
            localStorage.setItem('admin_logged', 'true');
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardMain').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('loginError').innerText = 'Invalid username or password';
        }
    }

    function logout() {
        localStorage.removeItem('admin_logged');
        location.reload();
    }

    function showSection(section) {
        document.getElementById('overviewSection').style.display = section === 'overview' ? 'block' : 'none';
        document.getElementById('sessionsSection').style.display = section === 'sessions' ? 'block' : 'none';
        document.getElementById('premiumSection').style.display = section === 'premium' ? 'block' : 'none';
        if(section === 'sessions') loadSessions();
        if(section === 'premium') loadPremiumList();
        if(section === 'overview') loadStats();
    }

    function showToast(msg) {
        let t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function loadStats() {
        try {
            let res = await fetch('/active');
            let data = await res.json();
            let count = data.count || 0;
            document.getElementById('totalBots').innerText = count;
            document.getElementById('activeBots').innerText = count;
            let premiumCount = 0;
            if(data.numbers && data.numbers.length) {
                for(let num of data.numbers) {
                    let cfg = await fetch(`/api/config?number=${num}`).then(r=>r.json());
                    if(cfg.premium === 'true') premiumCount++;
                }
            }
            document.getElementById('premiumCount').innerText = premiumCount;
        } catch(e) { console.error(e); }
    }

    async function loadSessions() {
        try {
            let res = await fetch('/active');
            let data = await res.json();
            let tbody = document.getElementById('sessionsBody');
            if(data.numbers && data.numbers.length) {
                tbody.innerHTML = '';
                for(let num of data.numbers) {
                    let statusRes = await fetch(`/status?number=${num}`);
                    let statusData = await statusRes.json();
                    let statsRes = await fetch(`/stats?number=${num}`);
                    let statsData = await statsRes.json();
                    let configRes = await fetch(`/api/config?number=${num}`);
                    let configData = await configRes.json();
                    let isPremium = configData.premium === 'true';
                    let row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${num}</td>
                        <td><span style="color:#0f0">● ONLINE</span></td>
                        <td>${statusData.uptime || 0}s</td>
                        <td>${statsData.stats?.messagesReceived || 0}</td>
                        <td>${statsData.stats?.commandsUsed || 0}</td>
                        <td>${isPremium ? '<span class="premium-badge" style="background:#ffd700;color:#000;padding:2px 8px;border-radius:20px;">PREMIUM</span>' : 'Free'}</td>
                        <td class="action-buttons">
                            <button class="action-btn" onclick="viewSession('${num}')"><i class="fas fa-eye"></i></button>
                            <button class="action-btn" onclick="disconnectSession('${num}')"><i class="fas fa-power-off"></i></button>
                            <button class="action-btn" onclick="togglePremium('${num}')"><i class="fas fa-gem"></i></button>
                        </td>
                    `;
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="7">No active sessions</td></tr>';
            }
        } catch(e) { console.error(e); }
    }

    async function loadPremiumList() {
        try {
            let res = await fetch('/active');
            let data = await res.json();
            let tbody = document.getElementById('premiumBody');
            if(data.numbers && data.numbers.length) {
                tbody.innerHTML = '';
                for(let num of data.numbers) {
                    let configRes = await fetch(`/api/config?number=${num}`);
                    let configData = await configRes.json();
                    let isPremium = configData.premium === 'true';
                    let row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${num}</td>
                        <td>${isPremium ? '⭐ Premium' : '🔹 Free'}</td>
                        <td><button onclick="togglePremium('${num}')" style="background:#00f6ff; border:none; padding:6px 12px; border-radius:20px; cursor:pointer;">${isPremium ? 'Downgrade' : 'Upgrade'}</button></td>
                    `;
                }
            } else { tbody.innerHTML = '<tr><td colspan="3">No bots connected</td></tr>'; }
        } catch(e) { console.error(e); }
    }

    async function togglePremium(number) {
        try {
            let current = await fetch(`/api/config?number=${number}`).then(r=>r.json());
            let newPremium = current.premium !== 'true' ? 'true' : 'false';
            await fetch('/api/config/update', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ number: number, config: { premium: newPremium } })
            });
            showToast(`Premium toggled for ${number}`);
            loadSessions();
            loadPremiumList();
            loadStats();
        } catch(e) { showToast('Error updating premium'); }
    }

    async function viewSession(num) { window.location.href = `/config?number=${num}`; }
    async function disconnectSession(num) { if(confirm(`Disconnect ${num}?`)) { await fetch(`/disconnect?number=${num}`); loadSessions(); loadStats(); } }
    async function reconnectAll() { await fetch('/connect-all'); showToast('Reconnecting all bots...'); setTimeout(()=>{loadStats();loadSessions();},3000); }
    async function disconnectAll() { if(confirm('Disconnect ALL bots?')) { await fetch('/disconnect-all'); loadStats(); loadSessions(); } }
    function refreshData() { loadStats(); loadSessions(); loadPremiumList(); }
    function loadAllData() { loadStats(); loadSessions(); }

    // Check if already logged in (via localStorage)
    if(localStorage.getItem('admin_logged') === 'true') {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardMain').style.display = 'block';
        loadAllData();
    } else {
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('dashboardMain').style.display = 'none';
    }
</script>
</body>
</html>
