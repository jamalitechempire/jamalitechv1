<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI MD | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0a0f1a 50%, #000428 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 246, 255, 0.2);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00f6ff;
        }

        .sessions-table-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #00f6ff;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-view { background: #00f6ff; color: #000; }
        .btn-reconnect { background: #00ff88; color: #000; }
        .btn-disconnect { background: #ff4444; color: #fff; }
        .btn-delete { background: #ff0000; color: #fff; }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .global-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .global-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .global-btn.danger {
            background: linear-gradient(135deg, #ff4444, #ff0000);
        }

        .global-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 246, 255, 0.3);
        }

        .settings-section {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 246, 255, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(0, 246, 255, 0.2);
        }

        @media (max-width: 768px) {
            .global-actions {
                flex-direction: column;
            }
            .action-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> JAMALI MD - ADMIN PANEL</h1>
        <div id="adminStatus" style="color: #00ff88;"><i class="fas fa-check-circle"></i> Admin Access: Granted</div>
    </div>

    <div class="stats-panel" id="statsPanel">
        <div class="stat-card">
            <div class="stat-number" id="totalSessions">0</div>
            <div>Total Sessions</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeSessions">0</div>
            <div>Active Now</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalVisitors">0</div>
            <div>Total Visitors</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayVisitors">0</div>
            <div>Today's Visitors</div>
        </div>
    </div>

    <div class="global-actions">
        <button class="global-btn" onclick="reconnectAll()"><i class="fas fa-sync-alt"></i> Reconnect All Bots</button>
        <button class="global-btn danger" onclick="disconnectAll()"><i class="fas fa-power-off"></i> Disconnect All Bots</button>
        <button class="global-btn" onclick="refreshSessions()"><i class="fas fa-refresh"></i> Refresh List</button>
    </div>

    <div class="sessions-table-container">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-server"></i> Active Bot Sessions</h3>
        <table id="sessionsTable">
            <thead>
                <tr><th>Number</th><th>Status</th><th>Uptime</th><th>Messages</th><th>Commands</th><th>Actions</th></tr>
            </thead>
            <tbody id="sessionsBody">
                <tr><td colspan="6" style="text-align: center;">Loading sessions...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="settings-section">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-lock"></i> Security Settings</h3>
        <div class="setting-item">
            <span><i class="fas fa-key"></i> Change Admin PIN</span>
            <div>
                <input type="password" id="newPin" placeholder="New PIN" style="margin-right: 10px;">
                <button class="global-btn" onclick="changeAdminPin()">Update PIN</button>
            </div>
        </div>
        <div class="setting-item">
            <span><i class="fas fa-chart-line"></i> Visitor Analytics</span>
            <button class="global-btn" onclick="viewAnalytics()">View Analytics</button>
        </div>
        <div class="setting-item">
            <span><i class="fas fa-database"></i> Database Status</span>
            <span id="dbStatus" style="color: #00ff88;">● Connected</span>
        </div>
    </div>
</div>

<script>
    let sessionsData = [];

    async function refreshSessions() {
        try {
            const res = await fetch('/active');
            const data = await res.json();
            
            document.getElementById('totalSessions').innerText = data.count || 0;
            document.getElementById('activeSessions').innerText = data.count || 0;
            
            const tbody = document.getElementById('sessionsBody');
            if(data.numbers && data.numbers.length > 0) {
                tbody.innerHTML = '';
                for(const num of data.numbers) {
                    const statusRes = await fetch(`/status?number=${num}`);
                    const statusData = await statusRes.json();
                    const statsRes = await fetch(`/stats?number=${num}`);
                    const statsData = await statsRes.json();
                    
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${num}</td>
                        <td><span style="color: #00ff88;">● ONLINE</span></td>
                        <td>${statusData.uptime || 0}s</td>
                        <td>${statsData.stats?.messagesReceived || 0}</td>
                        <td>${statsData.stats?.commandsUsed || 0}</td>
                        <td class="action-buttons">
                            <button class="action-btn btn-view" onclick="viewSession('${num}')">View</button>
                            <button class="action-btn btn-reconnect" onclick="reconnectSession('${num}')">Reconnect</button>
                            <button class="action-btn btn-disconnect" onclick="disconnectSession('${num}')">Disconnect</button>
                        </td>
                    `;
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No active sessions found</td></tr>';
            }
        } catch(e) {
            console.error('Error refreshing sessions:', e);
        }
    }

    async function reconnectAll() {
        if(confirm('⚠️ WARNING: Reconnect all bots? This will restart all active sessions.')) {
            try {
                const res = await fetch('/connect-all');
                const data = await res.json();
                alert(`Reconnected ${data.total} bots`);
                setTimeout(refreshSessions, 3000);
            } catch(e) {
                alert('Error reconnecting bots');
            }
        }
    }

    async function disconnectAll() {
        if(confirm('⚠️ DANGER: Disconnect ALL bots? This will remove all active sessions permanently!')) {
            const sessions = document.querySelectorAll('#sessionsBody tr');
            for(const row of sessions) {
                const number = row.cells[0]?.innerText;
                if(number && number !== 'No active sessions found') {
                    await fetch(`/disconnect?number=${number}`);
                }
            }
            alert('All bots disconnected');
            refreshSessions();
        }
    }

    function viewSession(number) {
        window.location.href = `config.html?number=${number}`;
    }

    async function reconnectSession(number) {
        if(confirm(`Reconnect bot for ${number}?`)) {
            try {
                await fetch(`/code?number=${number}`);
                alert('Reconnection initiated!');
                setTimeout(refreshSessions, 2000);
            } catch(e) {
                alert('Error reconnecting bot');
            }
        }
    }

    async function disconnectSession(number) {
        if(confirm(`⚠️ Disconnect bot for ${number}?`)) {
            try {
                await fetch(`/disconnect?number=${number}`);
                alert('Bot disconnected');
                refreshSessions();
            } catch(e) {
                alert('Error disconnecting bot');
            }
        }
    }

    function changeAdminPin() {
        const newPin = document.getElementById('newPin').value;
        if(newPin && newPin.length >= 4) {
            localStorage.setItem('admin_pin', newPin);
            alert(`Admin PIN changed to: ${newPin}\nPlease remember this PIN!`);
            document.getElementById('newPin').value = '';
        } else {
            alert('Please enter a PIN with at least 4 characters');
        }
    }

    function viewAnalytics() {
        alert(`📊 Analytics\n\nTotal Visitors: ${document.getElementById('totalVisitors').innerText}\nToday: ${document.getElementById('todayVisitors').innerText}\n\nMore detailed analytics coming soon!`);
    }

    // Track visitor
    function trackVisitor() {
        let visitors = localStorage.getItem('total_visitors') || 0;
        visitors = parseInt(visitors) + 1;
        localStorage.setItem('total_visitors', visitors);
        document.getElementById('totalVisitors').innerText = visitors;
        
        let today = new Date().toDateString();
        let todayVisitors = localStorage.getItem(`visitors_${today}`) || 0;
        todayVisitors = parseInt(todayVisitors) + 1;
        localStorage.setItem(`visitors_${today}`, todayVisitors);
        document.getElementById('todayVisitors').innerText = todayVisitors;
    }

    refreshSessions();
    setInterval(refreshSessions, 15000);
    trackVisitor();
</script>

</body>
</html>
